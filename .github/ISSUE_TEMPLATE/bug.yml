name: Bug report
description: Something in the spec, vectors or mock server is wrong or inconsistent
labels: [bug]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SPEC.md
        - vectors
        - mock server
        - divergence between an SDK and the spec
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: For divergences, name the SDK and paste the vector or call that behaves differently.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
