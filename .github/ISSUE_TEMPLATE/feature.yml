name: Feature request
description: Propose a change to the server SDK surface or contracts
labels: [enhancement]
body:
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change in SPEC.md, and why. Remember the five SDKs implement whatever lands here.
    validations:
      required: true
  - type: textarea
    id: compat
    attributes:
      label: Compatibility
      description: Does this break existing SDK behavior or vectors?
