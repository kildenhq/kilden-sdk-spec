name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  mockserver-image:
    runs-on: freshwork-runners
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/kilden-mockserver
          docker build -t "$IMAGE:${GITHUB_REF_NAME}" -t "$IMAGE:latest" mockserver/
          docker push "$IMAGE:${GITHUB_REF_NAME}"
          docker push "$IMAGE:latest"
      - name: github release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
